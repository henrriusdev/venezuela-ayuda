<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión — Venezuela Ayuda</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #f8fafc; color: #0f172a;
        margin: 0; display: grid; place-items: center; min-height: 100vh; padding: 24px; }
      .card { max-width: 420px; text-align: center; }
      h1 { font-size: 1.5rem; margin: 0 0 8px; }
      p { color: #475569; }
      button { margin-top: 16px; background: #dc2626; color: #fff; border: 0; border-radius: 12px;
        padding: 14px 20px; font-size: 1rem; font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="font-size:48px">📡</div>
      <h1>Sin conexión</h1>
      <p>No hay internet en este momento. Cuando recuperes la señal, vuelve a intentarlo.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
