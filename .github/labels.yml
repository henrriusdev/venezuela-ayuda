# Taxonomía de labels — fuente de verdad.
# La aplica .github/workflows/labels.yml (sync, skip-delete: no borra las que no estén aquí).
# Alternativa manual (sin CI) en docs/colaboracion/gestion-de-issues.md.

# ── Tipo ──────────────────────────────────────────────────────────────────────
- name: "bug"
  color: "d73a4a"
  description: "Algo no funciona"
- name: "enhancement"
  color: "a2eeef"
  description: "Funcionalidad nueva o mejora"
- name: "documentation"
  color: "0075ca"
  description: "Documentación"
- name: "question"
  color: "d876e3"
  description: "Pregunta / necesita info"

# ── Área (alineado con .github/CODEOWNERS) ────────────────────────────────────
- name: "area:ingesta"
  color: "1d76db"
  description: "Hub API / ingesta de socios"
- name: "area:datos"
  color: "1d76db"
  description: "Datos / deduplicación"
- name: "area:fr"
  color: "1d76db"
  description: "Reconocimiento facial"
- name: "area:admin"
  color: "1d76db"
  description: "Admin / moderación"
- name: "area:ui"
  color: "1d76db"
  description: "Mapa / UI pública"
- name: "area:db"
  color: "1d76db"
  description: "Base de datos / migraciones"
- name: "area:ci"
  color: "1d76db"
  description: "CI / infraestructura"

# ── Prioridad ─────────────────────────────────────────────────────────────────
- name: "priority:p0"
  color: "b60205"
  description: "Crítico — afecta producción ahora"
- name: "priority:p1"
  color: "d93f0b"
  description: "Alto"
- name: "priority:p2"
  color: "fbca04"
  description: "Medio"
- name: "priority:p3"
  color: "c2e0c6"
  description: "Bajo"

# ── Estado (ciclo de vida del issue) ──────────────────────────────────────────
- name: "status:needs-triage"
  color: "ededed"
  description: "Sin clasificar — espera triage"
- name: "status:triaged"
  color: "0e8a16"
  description: "Clasificado y listo para tomar"
- name: "status:in-progress"
  color: "fbca04"
  description: "Alguien lo está trabajando"
- name: "status:blocked"
  color: "b60205"
  description: "Bloqueado por una dependencia"

# ── Especiales ────────────────────────────────────────────────────────────────
- name: "good first issue"
  color: "7057ff"
  description: "Buen punto de entrada para nuevos"
- name: "help wanted"
  color: "008672"
  description: "Se busca ayuda"
- name: "security"
  color: "b60205"
  description: "Seguridad / privacidad (¡no expongas detalles en público!)"
