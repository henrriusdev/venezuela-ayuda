name: Sync labels

# Sincroniza las labels del repo con .github/labels.yml.
# - skip-delete: true → NO borra labels que no estén en el archivo (seguro).
# - Corre manual (workflow_dispatch) y al cambiar el archivo en main.
# Requiere permiso issues:write (lo da el GITHUB_TOKEN del propio workflow).

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
      - ".github/workflows/labels.yml"

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: true
          dry-run: false
