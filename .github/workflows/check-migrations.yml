name: Check migrations applied

# Heads-up check on PRs: flags when a PR adds a migration that isn't applied to
# the target branch's database yet. On merge, the "Apply migrations" workflow
# applies it automatically — so this is informational.
#
# Branch-aware: checks against the DB of the PR's BASE branch — a PR into staging
# checks the staging DB, a PR into main checks prod. Needs staging twins of the
# secrets: NEXT_PUBLIC_SUPABASE_URL_STAGING + SUPABASE_SECRET_KEY_STAGING.
on:
  pull_request:
  workflow_dispatch: {}

# Least privilege: informational check, no GitHub API writes needed.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # PR → github.base_ref (target branch); manual run → github.ref_name.
      NEXT_PUBLIC_SUPABASE_URL: ${{ (github.base_ref == 'staging' || github.ref_name == 'staging') && secrets.NEXT_PUBLIC_SUPABASE_URL_STAGING || secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ (github.base_ref == 'staging' || github.ref_name == 'staging') && secrets.SUPABASE_SECRET_KEY_STAGING || secrets.SUPABASE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify all migrations are applied
        run: node scripts/check-migrations.mjs
