name: Check migrations applied

# Heads-up check on PRs: flags when a PR adds a migration that isn't applied to
# the database yet. On merge to main, the "Apply migrations" workflow applies it
# automatically — so this is informational.
on:
  pull_request:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify all migrations are applied
        run: node scripts/check-migrations.mjs
