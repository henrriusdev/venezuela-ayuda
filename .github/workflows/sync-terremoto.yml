name: Sync TerremotoVenezuela API

on:
  # schedule:
  #   - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch: # Allows manual triggering from GitHub UI

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Run Sync Script
        run: node scripts/sync-terremoto.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ github.ref_name == 'staging' && secrets.NEXT_PUBLIC_SUPABASE_URL_STAGING || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ github.ref_name == 'staging' && secrets.SUPABASE_SECRET_KEY_STAGING || secrets.SUPABASE_SECRET_KEY }}

