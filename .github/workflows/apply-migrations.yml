name: Apply migrations

# Auto-applies any pending migrations to the database on every push to main
# (and manually). Each migration runs once, gated by the applied_migrations
# table. Requires the SUPABASE_DB_URL secret (Supabase "Session pooler" URI).
on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "scripts/apply-migrations.sh"
      - ".github/workflows/apply-migrations.yml"
  workflow_dispatch: {}

concurrency:
  group: apply-migrations
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Install psql
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Apply pending migrations
        run: bash scripts/apply-migrations.sh
