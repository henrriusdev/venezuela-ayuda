name: Apply migrations

# Auto-applies any pending migrations on every push to main (→ prod) and staging
# (→ staging DB), and manually. Each migration runs once, gated by the
# applied_migrations table. Needs two "Session pooler" URI secrets:
#   SUPABASE_DB_URL          → production DB (main)
#   SUPABASE_DB_URL_STAGING  → staging DB (staging branch)
on:
  push:
    branches: [main, staging]
    paths:
      - "supabase/migrations/**"
      - "scripts/apply-migrations.sh"
      - ".github/workflows/apply-migrations.yml"
  workflow_dispatch: {}

# Least privilege: this job only checks out code and talks to the DB over a
# secret URI; it never uses the GitHub API, so GITHUB_TOKEN stays read-only.
permissions:
  contents: read

concurrency:
  # Per-branch group so a staging run never queues behind a main run.
  group: apply-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Pick the DB by branch: staging → staging secret, everything else → prod.
      SUPABASE_DB_URL: ${{ github.ref == 'refs/heads/staging' && secrets.SUPABASE_DB_URL_STAGING || secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Install psql
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Apply pending migrations
        run: bash scripts/apply-migrations.sh
