name: Dedup cleanup

# Corre el dedup fuzzy cross-fuente sobre la data existente (idempotente, no
# destructivo salvo colapsar duplicados con confianza alta).
#
# El PULL (scrape de sitios hermanos) se RETIRÓ: el hub es push-only — los socios
# reportan vía POST /api/v1/ingest. Este job conserva el dedup fuzzy.
#
# SCHEDULE EN PAUSA: el cron horario se deja DESHABILITADO a propósito (no se
# reactiva al promover a main). Se corre solo manualmente desde la pestaña
# Actions hasta decidir conscientemente reactivar el horario en producción.
on:
  # schedule:
  #   - cron: "0 * * * *" # cada hora — PAUSADO, reactivar deliberadamente
  workflow_dispatch: {} # solo manual desde la pestaña Actions

# Least privilege: only checks out code and talks to the DB; no GitHub API use.
permissions:
  contents: read

concurrency:
  group: dedup
  cancel-in-progress: false

jobs:
  dedup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Branch-aware: dispatch from staging → staging DB, otherwise prod. Reuses
      # the same staging secrets as the migration workflows.
      NEXT_PUBLIC_SUPABASE_URL: ${{ github.ref_name == 'staging' && secrets.NEXT_PUBLIC_SUPABASE_URL_STAGING || secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ github.ref_name == 'staging' && secrets.SUPABASE_SECRET_KEY_STAGING || secrets.SUPABASE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fuzzy dedup cleanup
        run: node scripts/ingest.mjs --dedup
