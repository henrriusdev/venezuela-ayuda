name: Ingest external sources

# Refreshes data from the sister sites + runs the fuzzy dedup cleanup.
# Idempotent: only new/changed records are inserted.
#
# AUTO-SYNC PAUSED (2026-06-25): desaparecidosterremotovenezuela.com was
# compromised and is mass-marking people as "found". The hourly schedule is
# disabled to stop poisoned data from flowing in. To resume: uncomment the
# `schedule` trigger below, run `gh workflow enable "Ingest external sources"`,
# and make sure the ingest no longer trusts that source's found/localizado status.
on:
  # schedule:
  #   - cron: "0 * * * *" # hourly — PAUSED, see note above
  workflow_dispatch: {} # manual runs only (Actions tab) while paused

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Import new records
        run: node scripts/ingest.mjs
      - name: Fuzzy dedup cleanup
        run: node scripts/ingest.mjs --dedup
